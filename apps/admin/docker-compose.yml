services:
  app:
    build:
      context: .
    tty: true
    working_dir: /app
    volumes:
      - .:/app
      # バージョン表示用に git コミット情報を読めるよう、リポジトリの .git を ro マウント
      - ../../.git:/app/.git:ro
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      # mobile-web が 4323 を使うので admin は 4324 を採用
      - "4324:4321"
