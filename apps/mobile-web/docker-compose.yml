services:
  app:
    build:
      context: .
    tty: true
    working_dir: /app
    volumes:
      - .:/app
    environment:
      - CHOKIDAR_USEPOLLING=true
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      # nouker（admin 4321 / mobile-web 4322）と被らないよう 4323 を採用
      - "4323:4321"
